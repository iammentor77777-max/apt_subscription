<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청약정보 자동정리 도구</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0f2a4e;
    --blue: #1a4a80;
    --light-blue: #e8f0fb;
    --bg: #f0f4f8;
    --white: #ffffff;
    --text: #1a2332;
    --muted: #8a9ab0;
    --border: #dce5f0;
    --green: #16a34a;
    --orange: #c2410c;
    --purple: #9333ea;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* 상단 헤더 */
  .top-bar {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .top-bar-title {
    color: white;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .top-bar-sub {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    margin-top: 2px;
  }
  .top-badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 500;
  }

  /* 메인 레이아웃 */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 24px;
    align-items: start;
  }

  /* 입력 패널 */
  .input-panel {
    background: var(--white);
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 2px 12px rgba(15,42,78,0.07);
    position: sticky;
    top: 24px;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 14px;
    background: var(--blue);
    border-radius: 2px;
  }

  textarea {
    width: 100%;
    height: 320px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12.5px;
    color: var(--text);
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    background: #fafbfd;
  }
  textarea:focus { border-color: var(--blue); background: white; }
  textarea::placeholder { color: #b0bac8; }

  .api-key-row {
    margin-top: 14px;
  }
  .api-key-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.04em;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .api-key-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    background: #fafbfd;
    letter-spacing: 0.05em;
  }
  .api-key-input:focus { border-color: var(--blue); background: white; }
  .api-key-hint {
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 5px;
  }
  .api-key-hint a { color: var(--blue); text-decoration: none; }

  .btn-generate {
    width: 100%;
    margin-top: 16px;
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-generate:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-download {
    width: 100%;
    margin-top: 10px;
    background: white;
    color: var(--blue);
    border: 1.5px solid var(--blue);
    border-radius: 10px;
    padding: 11px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .btn-download:hover { background: var(--light-blue); }

  /* 출력 패널 */
  .output-panel {
    min-height: 400px;
  }

  .empty-state {
    background: var(--white);
    border-radius: 16px;
    padding: 60px 32px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(15,42,78,0.07);
  }
  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .empty-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .empty-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* 로딩 */
  .loading-state {
    background: var(--white);
    border-radius: 16px;
    padding: 60px 32px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(15,42,78,0.07);
    display: none;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--light-blue);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .loading-sub {
    font-size: 12px;
    color: var(--muted);
  }

  /* 에러 */
  .error-state {
    background: #fff5f5;
    border: 1.5px solid #fecaca;
    border-radius: 16px;
    padding: 24px;
    display: none;
    color: #991b1b;
    font-size: 13px;
    line-height: 1.6;
  }

  /* 결과 출력 */
  .result-container {
    display: none;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== 청약정보 카드 스타일 ===== */
  .cheongak-header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    border-radius: 16px 16px 0 0;
    padding: 28px 32px 24px;
    color: white;
  }
  .cheongak-badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .cheongak-title {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .cheongak-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    font-weight: 300;
  }
  .cheongak-meta {
    display: flex;
    gap: 24px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .cheongak-meta-item .label {
    font-size: 10px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    letter-spacing: 0.05em;
    display: block;
  }
  .cheongak-meta-item .value {
    font-size: 14px;
    font-weight: 600;
  }
  .tag-row {
    margin-top: 14px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag {
    background: rgba(255,80,80,0.25);
    border: 1px solid rgba(255,100,100,0.5);
    color: #ffb3b3;
    border-radius: 4px;
    padding: 3px 9px;
    font-size: 11px;
    font-weight: 500;
  }

  .cheongak-section {
    background: white;
    margin-top: 2px;
    padding: 24px 32px;
  }
  .cheongak-section:last-child { border-radius: 0 0 16px 16px; }
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 14px;
    background: var(--blue);
    border-radius: 2px;
  }

  .cheongak-section table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .cheongak-section thead tr { background: var(--navy); color: white; }
  .cheongak-section thead th {
    padding: 10px 10px;
    font-weight: 600;
    font-size: 11.5px;
    text-align: center;
  }
  .cheongak-section thead th:first-child { text-align: left; }
  .cheongak-section tbody tr { border-bottom: 1px solid #eef1f5; }
  .cheongak-section tbody tr:hover { background: #f7f9fc; }
  .cheongak-section tbody tr.type-59 td:first-child { border-left: 3px solid #4a9eff; }
  .cheongak-section tbody tr.type-84 td:first-child { border-left: 3px solid #22c55e; }
  .cheongak-section tbody tr.type-106 td:first-child { border-left: 3px solid #f59e0b; }
  .cheongak-section tbody td { padding: 10px 10px; text-align: center; color: var(--text); }
  .cheongak-section tbody td:first-child { text-align: left; font-weight: 600; }
  .cheongak-section tfoot tr { background: var(--navy); }
  .cheongak-section tfoot td { padding: 11px 10px; text-align: center; color: white; font-size: 13px; font-weight: 700; }
  .cheongak-section tfoot td:first-child { text-align: left; }

  .badge-gap { display: inline-block; background: #eef4ff; color: #1a4a80; border-radius: 4px; padding: 2px 7px; font-size: 12px; font-weight: 700; }
  .badge-chu { display: inline-block; background: #f0fdf4; color: #16a34a; border-radius: 4px; padding: 2px 7px; font-size: 12px; font-weight: 700; }
  .badge-mujoo { display: inline-block; background: #fff7ed; color: #c2410c; border-radius: 4px; padding: 2px 7px; font-size: 12px; font-weight: 700; }
  .badge-1joo { display: inline-block; background: #fdf4ff; color: #9333ea; border-radius: 4px; padding: 2px 7px; font-size: 12px; font-weight: 700; }
  td.price { font-weight: 600; color: var(--navy); }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
    padding-bottom: 8px;
  }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .input-panel { position: static; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <div class="top-bar-title">🏠 청약정보 자동정리 도구</div>
    <div class="top-bar-sub">청약 공고 텍스트를 붙여넣으면 자동으로 정리해드립니다</div>
  </div>
  <div class="top-badge">AI Powered</div>
</div>

<div class="main">
  <!-- 입력 패널 -->
  <div class="input-panel">
    <div class="panel-title">청약 공고 입력</div>

    <textarea id="inputText" placeholder="청약홈 또는 청약 공고문에서 복사한 텍스트를 여기에 붙여넣으세요.

예시:
입주자모집공고 주요정보
라클라체자이드파인
공급위치 서울특별시 동작구...
청약일정
특별공급 2026-04-13
1순위 2026-04-14
..."></textarea>

    <div class="api-key-row">
      <div class="api-key-label">🔑 Anthropic API Key <span id="savedBadge" style="display:none; background:#d1fae5; color:#065f46; border-radius:10px; padding:2px 8px; font-size:10px; font-weight:600;">✓ 저장됨</span></div>
      <input type="password" class="api-key-input" id="apiKey" placeholder="sk-ant-api03-...">
      <div class="api-key-hint">처음 한 번만 입력하면 브라우저에 저장됩니다. <a href="https://console.anthropic.com" target="_blank">키 발급 →</a></div>
    </div>

    <button class="btn-generate" id="btnGenerate" onclick="generateReport()">
      ✨ 청약정보 자동 정리하기
    </button>
    <button class="btn-download" id="btnDownload" onclick="downloadHTML()">
      ⬇️ HTML 파일로 저장
    </button>
  </div>

  <!-- 출력 패널 -->
  <div class="output-panel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <div class="empty-title">청약 공고 텍스트를 입력해주세요</div>
      <div class="empty-desc">
        청약홈(apply.lh.or.kr) 또는 분양 공고문에서<br>
        텍스트를 복사해 붙여넣으면<br>
        깔끔하게 정리된 청약정보를 생성해드립니다.
      </div>
    </div>

    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <div class="loading-text">청약정보 분석 중...</div>
      <div class="loading-sub">AI가 공고 내용을 정리하고 있습니다</div>
    </div>

    <div class="error-state" id="errorState"></div>

    <div class="result-container" id="resultContainer"></div>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `당신은 청약 공고 텍스트를 분석해서 깔끔한 HTML 카드로 정리하는 전문가입니다.

입력된 청약 공고 텍스트를 분석하여 아래 형식의 HTML을 생성하세요.

### 출력 규칙
1. 반드시 아래 HTML 구조를 사용하세요 (CSS 클래스 이름 동일하게)
2. 가점제/추첨제 계산 규칙:
   - 60㎡ 이하: 가점 40% / 추첨 60%
   - 85㎡ 이하: 가점 70% / 추첨 30%  
   - 85㎡ 초과: 가점 80% / 추첨 20%
   - 무주택자추첨제 = 추첨제 × 75% (반올림)
   - 1주택자 추첨제 = 추첨제 − 무주택자추첨제
3. 세대수에서 가점/추첨 비율로 세대수를 계산하세요 (소수점 반올림)
4. HTML만 반환하세요. 설명이나 마크다운 없이 순수 HTML만 출력하세요.

### HTML 구조 템플릿

<div class="cheongak-header">
  <div class="cheongak-badge">[위치]</div>
  <h1 class="cheongak-title">[단지명]</h1>
  <div class="cheongak-sub">[시행사/시공사]</div>
  <div class="cheongak-meta">
    <div class="cheongak-meta-item"><span class="label">총 공급세대</span><span class="value">[N]세대</span></div>
    <div class="cheongak-meta-item"><span class="label">일반분양</span><span class="value">[N]세대</span></div>
    <div class="cheongak-meta-item"><span class="label">입주예정</span><span class="value">[YYYY년 MM월]</span></div>
    <div class="cheongak-meta-item"><span class="label">문의</span><span class="value">☎ [번호]</span></div>
  </div>
  <div class="tag-row">
    <!-- 투기과열지구, 청약과열지역, 정비사업 등 해당 태그만 -->
    <span class="tag">[태그]</span>
  </div>
</div>

<div class="cheongak-section">
  <div class="section-title">청약 일정</div>
  <table style="font-size:13px;">
    <thead><tr><th style="text-align:left;width:50%;">구분</th><th>일정</th></tr></thead>
    <tbody>
      <tr><td>모집공고일</td><td>[날짜]</td></tr>
      <tr><td>특별공급</td><td>[날짜]</td></tr>
      <tr><td>1순위 (해당지역)</td><td>[날짜]</td></tr>
      <tr><td>당첨자 발표일</td><td>[날짜]</td></tr>
      <tr><td>계약일</td><td>[날짜]</td></tr>
    </tbody>
  </table>
</div>

<div class="cheongak-section">
  <div class="section-title">일반분양 가점제 / 추첨제 현황</div>
  <table>
    <thead>
      <tr>
        <th>타입</th><th>분양가(만원)</th><th>일반분양 세대수</th>
        <th>가점제</th><th>추첨제</th><th>무주택자 추첨제</th><th>1주택자 추첨제</th>
      </tr>
    </thead>
    <tbody>
      <!-- 각 타입별로 행 추가. 60㎡이하는 type-59, 85㎡이하는 type-84, 초과는 type-106 클래스 사용 -->
      <tr class="type-59">
        <td>[타입]</td>
        <td class="price">[분양가]</td>
        <td>[세대수]</td>
        <td><span class="badge-gap">[가점제세대수]</span></td>
        <td><span class="badge-chu">[추첨제세대수]</span></td>
        <td><span class="badge-mujoo">[무주택자추첨제]</span></td>
        <td><span class="badge-1joo">[1주택자추첨제]</span></td>
      </tr>
    </tbody>
    <tfoot>
      <tr><td>합계</td><td>—</td><td>[합계]</td><td>[합계]</td><td>[합계]</td><td>[합계]</td><td>[합계]</td></tr>
    </tfoot>
  </table>
</div>`;

let generatedHTML = '';

async function generateReport() {
  const inputText = document.getElementById('inputText').value.trim();
  const apiKey = document.getElementById('apiKey').value.trim();

  if (!inputText) {
    alert('청약 공고 텍스트를 입력해주세요.');
    return;
  }
  if (!apiKey) {
    alert('Anthropic API Key를 입력해주세요.');
    return;
  }

  // UI 상태 변경
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';
  document.getElementById('resultContainer').style.display = 'none';
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('btnDownload').style.display = 'none';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: SYSTEM_PROMPT,
        messages: [
          { role: 'user', content: `다음 청약 공고 텍스트를 분석해서 HTML로 정리해주세요:\n\n${inputText}` }
        ]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `API 오류: ${response.status}`);
    }

    const data = await response.json();
    const htmlContent = data.content[0].text;

    // 결과 표시
    generatedHTML = htmlContent;
    const container = document.getElementById('resultContainer');
    container.innerHTML = htmlContent + '<div class="footer-note">※ 본 자료는 입주자모집공고 기준이며, 변경 사항은 반드시 공고문 원문을 확인하시기 바랍니다.</div>';

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('resultContainer').style.display = 'block';
    document.getElementById('btnDownload').style.display = 'block';

  } catch (error) {
    document.getElementById('loadingState').style.display = 'none';
    const errorEl = document.getElementById('errorState');
    errorEl.style.display = 'block';
    errorEl.innerHTML = `<strong>⚠️ 오류 발생</strong><br>${error.message}<br><br>API 키를 확인하거나 잠시 후 다시 시도해주세요.`;
  }

  document.getElementById('btnGenerate').disabled = false;
}
